<ion-content [scrollY]="true">

  <!-- SUCCESS OVERLAY -->
  <div class="success-overlay" *ngIf="paymentDone">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2>Registration Successful!</h2>
      <p>Welcome to VayGo Rider.<br/>Redirecting to login…</p>
    </div>
  </div>

  <div class="top-logo">
    <img src="assets/VayGoLogoWhite.png" alt="VayGo" />
  </div>

  <div class="card">
    <h2>Complete Payment</h2>

    <!-- PLAN SUMMARY -->
    <div class="plan-summary">
      <div class="summary-left">
        <span class="summary-label">{{ planName }}</span>
        <span class="summary-sub">Monthly subscription</span>
      </div>
      <div class="summary-right">
        <span class="amount">₹{{ amount }}</span>
        <span class="period">/mo</span>
      </div>
    </div>

    <!-- UPI LABEL -->
    <p class="section-label">Pay via UPI</p>

    <!-- UPI APP OPTIONS -->
    <div class="upi-app-list">

      <div class="upi-app-item" (click)="openPhonePe()">
        <img src="assets/phonepe-logo.svg" class="app-logo-img" alt="PhonePe" />
        <div class="app-info">
          <span class="app-name">PhonePe</span>
          <span class="app-sub">Pay ₹{{ amount }} via PhonePe</span>
        </div>
        <span class="app-arrow">&#8250;</span>
      </div>

      <div class="upi-app-item" (click)="openGooglePay()">
        <img src="assets/gpay-logo.svg" class="app-logo-img gpay-img" alt="Google Pay" />
        <div class="app-info">
          <span class="app-name">Google Pay</span>
          <span class="app-sub">Pay ₹{{ amount }} via Google Pay</span>
        </div>
        <span class="app-arrow">&#8250;</span>
      </div>

    </div>

    <p class="secure-note">🔒 100% Secure & Encrypted Payment</p>

  </div>

</ion-content>
