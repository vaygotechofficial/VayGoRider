<ion-content>

  <div class="top-logo">
    <img src="assets/VayGoLogoWhite.png" alt="VayGo" />
  </div>

  <div class="card">
    <h2>Verify OTP</h2>
    <p *ngIf="step === 1">Verifying your mobile number</p>
    <p *ngIf="step === 2">Verifying your Aadhaar</p>
    <p class="hint">Enter dummy OTP: <strong>123456</strong></p>

    <div class="otp-row">
      <input
        #otpInput
        *ngFor="let s of slots"
        class="otp-box"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="1"
        autocomplete="one-time-code"
        (input)="onInput($event, s)"
        (keydown)="onKeyDown($event, s)"
      />
    </div>

    <ion-text color="danger" *ngIf="errorMsg">
      <p class="err-msg">{{ errorMsg }}</p>
    </ion-text>

    <ion-button expand="block" class="btn" (click)="verifyOtp()">
      Verify & Continue
    </ion-button>

    <div class="timer-row">
      <span *ngIf="timer > 0" class="timer-text">Resend OTP in {{ timer }}s</span>
      <ion-button *ngIf="timer === 0" expand="block" class="resend-btn" (click)="resendOtp()">
        Resend OTP
      </ion-button>
    </div>
  </div>

</ion-content>
