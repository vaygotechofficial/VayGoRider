<ion-content>

  <div class="top-logo">
    <img src="assets/VayGoLogoWhite.png" alt="VayGo" />
  </div>

  <div class="card">

    <h2>Confirm OTP</h2>
    <p>Enter 6-digit code sent to {{ mobile }}</p>

    <ion-button expand="block" size="small" class="btn-change" (click)="changeNumber()">
      Change Number
    </ion-button>

    <div class="otp-row">
      <input
        #otpInput
        *ngFor="let s of slots"
        class="otp-box"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="1"
        autocomplete="one-time-code"
        (input)="onInput($event, s)"
        (keydown)="onKeyDown($event, s)"
      />
    </div>

    <ion-text color="danger" *ngIf="errorMsg">
      <p class="ion-text-center">{{ errorMsg }}</p>
    </ion-text>

    <ion-button expand="block" class="btn" (click)="verifyOtp()">
      Verify & Continue
    </ion-button>

    <div class="timer">
      <span *ngIf="timer > 0">Resend OTP in {{ timer }}s</span>
      <ion-button *ngIf="timer === 0" expand="block" class="btn-resend" (click)="resendOtp()">
        Resend OTP
      </ion-button>
    </div>

  </div>

</ion-content>
